name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Test (Linux — needs xvfb for VS Code Electron tests)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a pnpm -r test
      - name: Test (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        run: pnpm -r test
